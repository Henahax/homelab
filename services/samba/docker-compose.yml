services:
  samba:
    container_name: samba
    image: ghcr.io/servercontainers/samba:latest
    restart: always
    network_mode: "host"
    cap_add:
      - CAP_NET_ADMIN
    environment:
      # Samba user/password and UID/GID mapping
      ACCOUNT_Henahax: ${PASSWORD}
      UID_Henahax: "1000"
      GID_Henahax: "1000"

      # Samba global settings
      SAMBA_GLOBAL_STANZA: "server string = Docker Samba Server"

      # NetBIOS name (optional, shows up in Windows Explorer)
      NETBIOS_NAME: "services"

      # Share configuration with forced user/group
      SAMBA_VOLUME_CONFIG_data: "[container-volumes];path=/shares/data;available=yes;browsable=yes;read only=no;guest ok=no;force user=Henahax;create mask=0664;directory mask=0775"

    volumes:
      - samba_data:/shares/data

volumes:
  samba_data:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes
      o: bind
