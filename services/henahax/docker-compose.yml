services:
  henahax-homepage:
    container_name: henahax-homepage
    image: henahax/homepage:latest
    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin

    ports:
      - "8080:4321"

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`henahax.net`,`www.henahax.net`,`henahax.de`,`www.henahax.de`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.services.homepage.loadbalancer.server.port=4321"

  henahax-voice-server-api:
    container_name: henahax-voice-server-api
    image: henahax/voice-server-api:latest
    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin

    ports:
      - "8082:3000"

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.voice.rule=Host(`api.henahax.net`,`voice-server-api.henahax.net`)"
      - "traefik.http.routers.voice.entrypoints=websecure"
      - "traefik.http.routers.voice.tls=true"
      - "traefik.http.routers.voice.service=voice"
      - "traefik.http.routers.voice-homepage-api.rule=Host(`henahax.net`,`www.henahax.net`) && PathPrefix(`/api/teamspeak`)"
      - "traefik.http.routers.voice-homepage-api.entrypoints=websecure"
      - "traefik.http.routers.voice-homepage-api.tls=true"
      - "traefik.http.routers.voice-homepage-api.priority=100"
      - "traefik.http.routers.voice-homepage-api.service=voice"
      - "traefik.http.services.voice.loadbalancer.server.port=3000"

  henahax-gw2tools:
    container_name: henahax-gw2tools
    image: henahax/gw2tools:latest
    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin

    ports:
      - "8081:3000"

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gw2.rule=Host(`gw2.henahax.net`, `gw2.henahax.de`)"
      - "traefik.http.routers.gw2.entrypoints=websecure"
      - "traefik.http.routers.gw2.tls=true"
      - "traefik.http.services.gw2.loadbalancer.server.port=3000"

networks:
  traefik:
    external: true
