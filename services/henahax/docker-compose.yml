services:
  henahax-homepage:
    container_name: henahax-homepage
    image: henahax/homepage:latest
    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin

    ports:
      - "8080:4321"

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`henahax.net`) || Host(`henahax.de`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.services.homepage.loadbalancer.server.port=4321"

  henahax-voice-server-api:
    container_name: henahax-voice-server-api
    image: henahax/voice-server-api:latest
    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin

    ports:
      - "8082:3000"

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.voice.rule=Host(`voice-server-api.henahax.net`) || Host(`voice-server-api.henahax.de`)"
      - "traefik.http.routers.voice.entrypoints=websecure"
      - "traefik.http.routers.voice.tls=true"
      - "traefik.http.services.voice.loadbalancer.server.port=3000"

  henahax-gw2tools:
    container_name: henahax-gw2tools
    image: henahax/gw2tools:latest
    restart: unless-stopped

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin

    ports:
      - "8081:3000"

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gw2tools.rule=Host(`gw2tools.henahax.net`) || Host(`gw2tools.henahax.de`)"
      - "traefik.http.routers.gw2tools.entrypoints=websecure"
      - "traefik.http.routers.gw2tools.tls=true"
      - "traefik.http.services.gw2tools.loadbalancer.server.port=3000"

networks:
  traefik:
    external: true
