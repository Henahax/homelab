services:
  henahax-homepage: #nginx
    container_name: henahax-homepage
    image: henahax/homepage:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    ports:
      - 8080:4321
    restart: unless-stopped
  henahax-voice-server-api: #nginx
    container_name: henahax-voice-server-api
    image: henahax/voice-server-api:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    ports:
      - 8082:3000
    restart: unless-stopped
  henahax-gw2tools: #nginx
    container_name: henahax-gw2tools
    image: henahax/gw2tools:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    ports:
      - 8081:3000
    restart: unless-stopped
