services:
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql

    ports:
      - "5432:5432"

    networks:
      - database

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    ports:
      - "9432:80"

    networks:
      - traefik
      - database

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.henahax.net`) || Host(`pgadmin.henahax.de`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.routers.pgadmin.middlewares=lan-only@file"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/data/postgres
      o: bind

  pgadmin_data:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/data/pgadmin
      o: bind

networks:
  traefik:
    external: true

  database:
    external: true
