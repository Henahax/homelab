services:
  ddns-updater:
    container_name: ddns-updater
    image: qmcgaw/ddns-updater:latest
    restart: unless-stopped

    environment:
      - TZ=Europe/Berlin

      # 🌐 No direct LAN port needed (Traefik only)
      # ports:
      - "8000:8000"

    volumes:
      # persistent config + history
      - ddns_data:/updater/data

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ddns-local.rule=Host(`ddns.local`)"
      - "traefik.http.routers.ddns-local.entrypoints=web"
      - "traefik.http.routers.ddns-local.middlewares=lan-only@file"
      - "traefik.http.services.ddns.loadbalancer.server.port=8000"

volumes:
  ddns_data:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/data/ddns-updater
      o: bind

networks:
  traefik:
    external: true
