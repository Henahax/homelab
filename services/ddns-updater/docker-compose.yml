services:
  ddns-updater:
    container_name: ddns-updater
    image: qmcgaw/ddns-updater:latest
    restart: unless-stopped

    healthcheck:
      disable: true

    environment:
      - TZ=Europe/Berlin
      - CONFIG=${CONFIG}

    ports:
      - "8000:8000"

    volumes:
      - ddns_data:/updater/data

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ddns.rule=Host(`ddns.henahax.net`) || Host(`ddns.henahax.de`)"
      - "traefik.http.routers.ddns.entrypoints=websecure"
      - "traefik.http.routers.ddns.tls=true"
      - "traefik.http.routers.ddns.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ddns.middlewares=lan-only@file"
      - "traefik.http.services.ddns.loadbalancer.server.port=8000"

volumes:
  ddns_data:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/data/ddns-updater
      o: bind

networks:
  traefik:
    external: true
