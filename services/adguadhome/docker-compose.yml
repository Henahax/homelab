services:
  adguardhome:
    container_name: adguardhome
    image: adguard/adguardhome
    restart: unless-stopped

    # 🧯 KEEP DIRECT ACCESS (DNS + UI fallback)
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8053:3000/tcp"

    volumes:
      - adguardhome_config:/opt/adguardhome/conf
      - adguardhome_work:/opt/adguardhome/work

    networks:
      - traefik

    labels:
      - "traefik.enable=true"

      # 🌐 Web UI via domain
      - "traefik.http.routers.adguard.rule=Host(`adguard.henahax.net`,`adguard.henahax.de`)"
      - "traefik.http.routers.adguard.entrypoints=websecure"
      - "traefik.http.routers.adguard.tls=true"

      # 🔒 LAN-only access (your existing middleware)
      - "traefik.http.routers.adguard.middlewares=lan-only@file"

      # 🧭 Internal port (AdGuard UI runs on 3000 in container)
      - "traefik.http.services.adguard.loadbalancer.server.port=3000"

volumes:
  adguardhome_config:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/config/adguardhome
      o: bind

  adguardhome_work:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/work/adguardhome
      o: bind

networks:
  traefik:
    external: true
