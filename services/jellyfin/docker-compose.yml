services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      # - JELLYFIN_PublishedServerUrl=http://192.168.0.11 #optional
    volumes:
      - jellyfin_config:/config
      - /mnt/files/media/movies:/data/movies
      - /mnt/files/media/tv:/data/tvshows
    ports:
      - 8096:8096 #http web
      # - 8920:8920 #optional https web
      - 7359:7359/udp #optional client discover in lan
      - 1900:1900/udp #optional discovery DNLA

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.henahax.net`)"
      - "traefik.http.routers.jellyfin.middlewares=lan-only-secure@file"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

    restart: unless-stopped
volumes:
  jellyfin_config:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/config/jellyfin
      o: bind

networks:
  traefik:
    external: true
