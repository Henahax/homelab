      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - onlyfans
        - security-headers@file
      service: noop@internal
      priority: 90

    redirect-reset:
      rule: "Host(`reset.henahax.net`) || Host(`reset.henahax.de`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - reset
        - security-headers@file
      service: noop@internal
