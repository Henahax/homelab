http:
  routers:
    redirect-gw2-net:
      rule: "Host(`gw2tools.henahax.net`) || Host(`gw2tools.henahax.de`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - gw2.net
        - security-headers@file
      service: noop@internal
      priority: 100

    redirect-henahax-de:
      rule: "Host(`henahax.de`) || Host(`www.henahax.de`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - henahax.de
        - security-headers@file
      service: noop@internal
      priority: 100

    redirect-gw2-de:
      rule: "Host(`gw2.henahax.de`) || Host(`gw2tools.henahax.de`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - gw2.de
        - security-headers@file
      service: noop@internal
      priority: 100

    # Subdomain Redirects (Priorität 90)
    redirect-contact:
      rule: "Host(`contact.henahax.net`) || Host(`contact.henahax.de`) || Host(`kontakt.henahax.net`) || Host(`kontakt.henahax.de`) || Host(`links.henahax.net`) || Host(`links.henahax.de`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - contact
        - security-headers@file
      service: noop@internal
      priority: 90

    redirect-magicfind:
