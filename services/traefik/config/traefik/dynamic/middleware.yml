http:
  middlewares:
    lan-only:
      ipWhiteList:
        sourceRange:
          - 192.168.0.0/16

    github:
      redirectRegex:
        regex: "^https?://github\\.henahax\\.(net|de)(/.*)?$"
        replacement: "https://github.com/henahax"
        permanent: true

  routers:
    traefik-dashboard:
      rule: Host(`traefik.henahax.net`) || Host(`traefik.henahax.de`)
      service: api@internal
      entryPoints:
        - websecure
      tls: true
      middlewares:
        - lan-only@file
