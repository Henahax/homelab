http:
  middlewares:
    lan-only:
      ipWhiteList:
        sourceRange:
          - 192.168.0.0/16

    github:
      redirectRegex:
        regex: "^https?://github\\.henahax\\.(net|de)(/.*)?$"
        replacement: "https://github.com/henahax"
        permanent: true

    ts.henahax.net:
      redirectRegex:
        regex: "^https?://(ts|discord|ts3|ts6)\\.henahax\\.net(/.*)?$"
        replacement: "https://henahax.net/server"
        permanent: true

    ts.henahax.de:
      redirectRegex:
        regex: "^https?://(ts|discord|ts3|ts6)\\.henahax\\.de(/.*)?$"
        replacement: "https://henahax.de/server"
        permanent: true

  routers:
    traefik-dashboard-local:
      rule: Host(`traefik.local`)
      service: api@internal
      entryPoints:
        - web
      middlewares:
        - lan-only@file
