api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: henahax.net
            sans:
              - "*.henahax.net"
          - main: henahax.de
            sans:
              - "*.henahax.de"

providers:
  docker:
    exposedByDefault: false

  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: letsencrypt@henahax.net
      storage: /data/acme.json
      dnsChallenge:
        provider: cloudflare
