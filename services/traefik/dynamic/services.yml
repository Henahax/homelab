http:
  routers:
    wildcard-henahax:
      rule: "HostRegexp(`{subdomain:.+}.henahax.net`)"
      entryPoints:
        - websecure
      service: henahax-service
      tls:
        certResolver: le
      priority: 1

  services:
    henahax-service:
      loadBalancer:
        servers:
          - url: "http://192.168.0.11:8080"
