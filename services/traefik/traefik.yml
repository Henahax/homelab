# Static configuration for Traefik

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"

  traefik:
    address: ":8080"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false

  file:
    directory: /container-volumes/traefik/dynamic
    watch: true

certificatesResolvers:
  le:
    acme:
      email: letsencrypt@henahax.net
      storage: /container-volumes/traefik/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO
accessLog: {}

api:
  dashboard: true
  insecure: true
