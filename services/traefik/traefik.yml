################################################################
#
# Static configuration for Traefik v2/v3
#
# This file defines infrastructure-level settings:
# - entrypoints (ports)
# - certificate resolver (Let's Encrypt)
# - providers (Docker)
#
# Dynamic routing for services is configured via Docker labels.
#
################################################################

################################################################
# Global configuration
################################################################

global:
  # Check if a new Traefik version is available
  checkNewVersion: true

  # Send anonymous usage data (disable if you prefer privacy)
  sendAnonymousUsage: false

################################################################
# EntryPoints configuration
################################################################

entryPoints:
  # HTTP entrypoint
  # Used for:
  # - Let's Encrypt HTTP challenge
  # - redirecting HTTP → HTTPS
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  # HTTPS entrypoint
  # All routers using TLS will use this entrypoint
  websecure:
    address: ":443"
    http:
      tls:
        # Use the certificate resolver defined below
        certResolver: le

  # Traefik dashboard entrypoint
  # Dedicated port for dashboard and internal API
  traefik:
    address: ":8080"

################################################################
# Let's Encrypt (ACME) configuration
################################################################

certificatesResolvers:
  le:
    acme:
      # Email used for Let's Encrypt registration and expiry notices
      email: "letsencrypt@henahax.net"

      # Storage for certificates (must be writable)
      # File must exist and have permissions 600
      storage: "/certs/acme.json"

      # HTTP-01 challenge
      # Let's Encrypt will verify domain ownership via:
      # http://yourdomain/.well-known/acme-challenge/*
      httpChallenge:
        entryPoint: web

################################################################
# Traefik logs configuration
################################################################

log:
  # Recommended level for production
  level: INFO

################################################################
# Access logs
################################################################

# Logs every HTTP request handled by Traefik
accessLog: {}

################################################################
# API and Dashboard
################################################################

api:
  # Enables the internal API
  dashboard: true

  # DO NOT enable insecure mode in production
  # It exposes the dashboard without authentication
  insecure: true

################################################################
# Docker provider
################################################################

providers:
  docker:
    # Use Docker socket
    endpoint: "unix:///var/run/docker.sock"

    # Do NOT expose containers automatically
    # Containers must explicitly enable Traefik via labels
    exposedByDefault: false

    # Optional but helpful when running multiple Docker networks
    #network: traefik
