services:
  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      # Load all static config from the volume
      - "--configFile=/container-volumes/traefik/traefik.yml"

    ports:
      - "80:80"
      - "443:443"
      - "9080:8080" # Dashboard

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_data:/container-volumes/traefik

    restart: unless-stopped

volumes:
  traefik_data:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/traefik
      o: bind
