services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped

    command:
      - "--configFile=/etc/traefik/traefik.yml"

    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}

    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

    ports:
      - "80:80"
      - "443:443"
      - "9008:8080"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard-local.rule=Host(`traefik.henahax.net`)"
      - "traefik.http.routers.traefik-dashboard-local.service=api@internal"
      - "traefik.http.routers.traefik-dashboard-local.middlewares=lan-only@file"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_config:/etc/traefik:ro
      - traefik_data:/data

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    networks:
      - traefik

volumes:
  traefik_config:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/config/traefik
      o: bind

  traefik_data:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/data/traefik
      o: bind

networks:
  traefik:
    external: true
