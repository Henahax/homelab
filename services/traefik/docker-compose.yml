services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped

    command:
      - "--configFile=/etc/traefik/traefik.yml"

    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}

    ports:
      - "80:80"
      - "443:443"
      - "9008:8080"

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard-local.rule=Host(`traefik.henahax.net`)"
      - "traefik.http.routers.traefik-dashboard-local.service=api@internal"
      - "traefik.http.routers.traefik-dashboard-local.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard-local.tls=true"
      - "traefik.http.routers.traefik-dashboard-local.middlewares=lan-only@file"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_config:/etc/traefik
      - traefik_data:/data

    networks:
      - traefik

volumes:
  traefik_config:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/config/traefik
      o: bind

  traefik_data:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/data/traefik
      o: bind

networks:
  traefik:
    external: true
