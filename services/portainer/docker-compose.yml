services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:lts
    restart: always

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

    ports:
      - "9000:9000"

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer-local.rule=Host(`portainer.local`)"
      - "traefik.http.routers.portainer-local.entrypoints=web"
      - "traefik.http.routers.portainer-local.middlewares=lan-only@file"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

volumes:
  portainer_data:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/config/portainer
      o: bind

networks:
  traefik:
    external: true
