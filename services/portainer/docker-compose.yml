services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:lts
    restart: always

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

    ports:
      - "9443:9443"

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.henahax.net`) || Host(`portainer.henahax.de`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.middlewares=lan-only@file"
      - "traefik.http.services.portainer.loadbalancer.server.port=9443"

volumes:
  portainer_data:
    driver: local
    driver_opts:
      type: none
      device: /container-volumes/config/portainer
      o: bind

networks:
  traefik:
    external: true
